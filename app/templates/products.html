<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>{{ mood|capitalize }} Mood - Recommended Products</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        background: linear-gradient(to right, #eaf6fb, #ffffff);
        padding: 40px 20px;
      }

      h2 {
        text-align: center;
        color: #0077b6;
        margin-bottom: 30px;
        font-weight: bold;
      }

      .card {
        border: none;
        border-radius: 15px;
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.08);
        transition: transform 0.2s;
      }

      .card:hover {
        transform: scale(1.02);
      }

      .card-img-top {
        height: 200px;
        object-fit: cover;
        border-top-left-radius: 15px;
        border-top-right-radius: 15px;
      }

      .btn-add {
        width: 100%;
        border-radius: 8px;
        background-color: #00b4d8;
        color: white;
        transition: background-color 0.3s ease;
      }

      .btn-add:hover {
        background-color: #0077b6;
      }

      .no-products {
        text-align: center;
        font-size: 18px;
        color: #999;
        margin-top: 50px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Recommended for "{{ mood|capitalize }}" Mood 🎧</h2>

      {% if products %}
      <div class="row row-cols-1 row-cols-md-3 g-4 mt-4">
        {% for product in products %}
        <div class="col">
          <div class="card h-100">
            <img
              src="{{ url_for('static', filename='images/' ~ product[3]) }}"
              class="card-img-top"
              alt="Product Image"
            />
            <div class="card-body">
              <h5 class="card-title">{{ product[1] }}</h5>
              <p class="card-text">₹{{ product[2] }}</p>
              <form
                method="POST"
                action="{{ url_for('main.add_to_cart', product_id=product[0]) }}"
              >
                <input
                  type="hidden"
                  name="username"
                  value="{{ session['username'] }}"
                />
                <button type="submit" class="btn btn-add mt-2">
                  🛒 Add to Cart
                </button>
              </form>
            </div>
          </div>
        </div>
        {% endfor %}
      </div>
      {% else %}
      <p class="no-products">No products available for this mood yet.</p>
      {% endif %}
    </div>
  </body>
</html>
