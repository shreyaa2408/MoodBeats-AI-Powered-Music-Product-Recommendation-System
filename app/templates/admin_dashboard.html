<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Admin Dashboard - MoodBeats</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background: linear-gradient(to right, #e0f7fa, #ffffff);
        font-family: "Segoe UI", sans-serif;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .card {
        width: 600px;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        background-color: white;
        text-align: center;
      }

      .admin-title {
        font-size: 28px;
        font-weight: bold;
        color: #0d6efd;
        margin-bottom: 15px;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
      }

      .lead {
        font-size: 1.1rem;
        color: #555;
        margin-bottom: 25px;
      }

      .btn-block {
        width: 100%;
        margin-bottom: 15px;
        border-radius: 10px;
      }

      .logout-btn {
        margin-top: 20px;
      }

      .flash-message {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 1050;
        background-color: rgba(0, 0, 0, 0.85);
        color: #fff;
        padding: 12px 24px;
        border-radius: 8px;
        font-size: 1rem;
        text-align: center;
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        animation: fadeInOut 3s ease forwards;
      }

      @keyframes fadeInOut {
        0% {
          opacity: 0;
          bottom: 0;
        }
        10%,
        90% {
          opacity: 1;
          bottom: 30px;
        }
        100% {
          opacity: 0;
          bottom: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="admin-title">
        <span>Welcome, Admin</span>
        <span style="font-size: 26px">👩‍💻</span>
      </div>
      <p class="lead">Manage products, users, and view analytics.</p>

      <a
        href="{{ url_for('main.add_product') }}"
        class="btn btn-outline-primary btn-block"
        >➕ Add New Product</a
      >

      <a
        href="{{ url_for('main.manage_products') }}"
        class="btn btn-outline-secondary btn-block"
        >🛍️ Manage Products</a
      >

      <a
        href="{{ url_for('main.manage_users') }}"
        class="btn btn-outline-info btn-block"
        >👥 Manage Users</a
      >

      <a href="/admin/users" class="btn btn-outline-success btn-block">
        🖥️ View All Users
      </a>

      <div class="logout-btn">
        <a href="{{ url_for('main.logout') }}"><button>Logout</button></a>
      </div>
    </div>
    {% with messages = get_flashed_messages() %} {% if messages %}
    <div class="flash-message">
      {% for message in messages %} {{ message }} {% endfor %}
    </div>
    {% endif %} {% endwith %}
  </body>
</html>
