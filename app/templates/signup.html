<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Sign Up - MoodBeats</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background: linear-gradient(to right, #e0f7fa, #ffffff);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: "Segoe UI", sans-serif;
      }

      .card {
        width: 400px;
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
      }

      h4 {
        color: #007bff;
        font-weight: bold;
        margin-bottom: 20px;
      }

      .form-control {
        border-radius: 10px;
      }

      .btn {
        border-radius: 10px;
      }

      .error {
        color: red;
        font-size: 0.9em;
      }

      .flash-message-container {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 1050;
        width: 100%;
        max-width: 400px;
        text-align: center;
      }

      .flash-message {
        display: inline-block;
        padding: 12px 20px;
        margin-bottom: 10px;
        border-radius: 10px;
        font-size: 1rem;
        font-weight: 500;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        animation: fadeInOut 3s ease forwards;
      }

      /* Success */
      .flash-message.success {
        background-color: #d1f7d6;
        color: #2e7d32;
        border: 1px solid #81c784;
      }

      /* Error */
      .flash-message.error {
        background-color: #fdecea;
        color: #c62828;
        border: 1px solid #e57373;
      }

      @keyframes fadeInOut {
        0% {
          opacity: 0;
          transform: translateY(20px);
        }
        10%,
        90% {
          opacity: 1;
          transform: translateY(0);
        }
        100% {
          opacity: 0;
          transform: translateY(-10px);
        }
      }
    </style>
  </head>
  <body>
    <div class="card text-center">
      <h4>Create Your MoodBeats Account</h4>
      <form action="/signup" method="POST" onsubmit="return validateForm()">
        <input
          type="text"
          name="username"
          class="form-control mb-3"
          placeholder="Username"
          required
        />

        <input
          type="password"
          name="password"
          id="password"
          class="form-control mb-1"
          placeholder="Password"
          required
        />
        <div
          id="strength"
          class="text-start mb-3 text-muted"
          style="font-size: 0.85em"
        >
          Password must be 6+ characters, include a number and a symbol.
        </div>

        <input
          type="text"
          name="phone"
          id="phone"
          class="form-control mb-3"
          placeholder="Phone Number"
          required
        />

        <input
          type="date"
          name="dob"
          class="form-control mb-3"
          placeholder="Date of Birth"
          required
        />

        <button type="submit" class="btn btn-success w-100">Sign Up</button>
      </form>

      <div class="mt-3">
        <a href="/">Back to Home</a>
      </div>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %} {% if
    messages %}
    <div class="flash-message-container">
      {% for category, message in messages %}
      <div class="flash-message {{ category }}">{{ message }}</div>
      {% endfor %}
    </div>
    {% endif %} {% endwith %}

    <script>
      function validateForm() {
        const phone = document.getElementById("phone").value.trim();
        const password = document.getElementById("password").value.trim();
        const phoneRegex = /^\d{10}$/;
        const strongPassword = /^(?=.*[0-9])(?=.*[!@#$%^&*]).{6,}$/;

        if (!phoneRegex.test(phone)) {
          alert("Phone number must be exactly 10 digits.");
          return false;
        }

        if (!strongPassword.test(password)) {
          alert(
            "Password must be at least 6 characters and include a number and symbol."
          );
          return false;
        }

        return true;
      }
    </script>
  </body>
</html>
