<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>User Dashboard - MoodBeats</title>

    <!-- Bootstrap CDN -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />

    <style>
      body {
        background: linear-gradient(to right, #e0f7fa, #ffffff);
        height: 100vh;
        font-family: "Segoe UI", sans-serif;
      }
      .dashboard {
        margin-top: 60px;
        text-align: center;
      }
      .card {
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        background-color: white;
      }
      .avatar {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        object-fit: cover;
        margin-bottom: 10px;
        border: 3px solid #00bcd4;
      }
      .username {
        font-size: 1.2rem;
        font-weight: bold;
        color: #333;
        margin-bottom: 20px;
      }
    </style>
  </head>
  <body>
    <div class="container dashboard">
      <div class="card mx-auto" style="max-width: 600px">
        <!-- ✅ Avatar/Profile -->
        <img
          src="{{ url_for('static', filename='images/user_avatar.png') }}"
          alt="User Avatar"
          class="avatar"
        />

        <h3 style="text-align: center; color: #007bff">
          👋 Welcome, {{ session['username'] }}!
        </h3>

        <h2 class="text-success">Welcome to MoodBeats 🎧</h2>
        <p class="lead">Your personalized music and product dashboard.</p>

        <div class="d-grid gap-2 mt-4">
          <a
            href="{{ url_for('main.emotion_detect_route') }}"
            class="btn btn-outline-primary"
          >
            Start Emotion Detection🎭
          </a>

          <a
            href="{{ url_for('main.emotion_detect_route') }}"
            class="btn btn-outline-primary"
          >
            Browse Recommended Products🎧
          </a>

          <a
            href="{{ url_for('main.view_cart') }}"
            class="btn btn-outline-primary"
            >View My Cart 🛒</a
          >
          <a
            href="{{ url_for('main.my_orders') }}"
            class="btn btn-outline-primary btn-block"
          >
            My Orders📦
          </a>

          <a href="{{ url_for('main.logout') }}"><button>Logout</button></a>
        </div>
      </div>
    </div>
  </body>
</html>
