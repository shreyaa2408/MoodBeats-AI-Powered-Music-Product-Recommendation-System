<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>MoodBeats - Home</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background: linear-gradient(to right, #e0f7fa, #ffffff);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Segoe UI", sans-serif;
        margin: 0;
        padding: 20px;
      }

      .card {
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        text-align: center;
        background-color: #ffffff;
        max-width: 500px;
        width: 100%;
      }

      h1 {
        color: #007bff;
        font-weight: bold;
        font-size: 2rem;
      }

      p {
        font-size: 18px;
        margin-top: 10px;
        color: #333;
      }

      .btn-group {
        margin-top: 30px;
      }

      .btn {
        width: 120px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Welcome to MoodBeats 🎧</h1>
      <p>Your AI-Powered Music & Mood Store</p>

      <div class="btn-group d-flex justify-content-center">
        <a href="{{ url_for('main.login_page') }}" class="btn btn-primary me-3">
          Login
        </a>
        <a
          href="{{ url_for('main.signup_page') }}"
          class="btn btn-outline-secondary"
        >
          Sign Up
        </a>
      </div>
    </div>
  </body>
</html>
