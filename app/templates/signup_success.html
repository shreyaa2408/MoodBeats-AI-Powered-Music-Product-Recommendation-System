<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Signup Success - MoodBeats</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background: linear-gradient(to right, #e0f7fa, #ffffff);
        height: 100vh;
        font-family: "Segoe UI", sans-serif;
        overflow: hidden;
        position: relative;
      }

      .card {
        width: 450px;
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        background-color: #ffffff;
        text-align: center;
        position: relative;
        z-index: 10;
      }

      .container {
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
        z-index: 10;
      }

      .music-icon {
        font-size: 40px;
        color: #007bff;
        margin-bottom: 10px;
      }

      h3 {
        font-weight: bold;
        color: #28a745;
      }

      .info {
        font-size: 16px;
        margin: 10px 0;
      }

      .btn {
        border-radius: 10px;
      }

      /* Music wave */
      svg {
        position: absolute;
        bottom: 0;
        width: 100%;
        height: 90px;
        z-index: 1;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <div class="music-icon">🎶</div>
        <h3>Signup Successful!</h3>
        <p class="text-muted">Welcome to <strong>MoodBeats</strong> 🎧</p>

        <div class="info"><b>Username:</b> {{ username }}</div>
        <div class="info"><b>Phone:</b> {{ phone }}</div>
        <div class="info"><b>DOB:</b> {{ dob }}</div>

        <a href="/login" class="btn btn-primary w-100 mt-4">Proceed to Login</a>
      </div>
    </div>

    <!-- Animated Music Wave SVG -->
    <svg viewBox="0 0 1200 120" preserveAspectRatio="none">
      <path d="M0,0 C300,100 900,0 1200,100 L1200,0 L0,0 Z" fill="#e0f7fa">
        <animate
          attributeName="d"
          dur="4s"
          repeatCount="indefinite"
          values="
          M0,0 C300,100 900,0 1200,100 L1200,0 L0,0 Z;
          M0,0 C300,0 900,100 1200,0 L1200,0 L0,0 Z;
          M0,0 C300,100 900,0 1200,100 L1200,0 L0,0 Z
        "
        />
      </path>
    </svg>
  </body>
</html>
