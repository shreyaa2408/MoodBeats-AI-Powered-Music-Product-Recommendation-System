<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>All Users - MoodBeats</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        background-color: #f0faff;
        padding: 40px;
        margin: 0;
      }

      .container-box {
        background: white;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.1);
        max-width: 950px;
        margin: auto;
      }

      h2 {
        text-align: center;
        color: #0077b6;
        font-weight: bold;
        margin-bottom: 25px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th {
        background-color: #0099cc; /* Dark blue */
        color: #fff;
        font-weight: bold;
        text-transform: uppercase;
      }

      th,
      td {
        padding: 14px;
        text-align: center;
        border: 1px solid #ddd;
      }

      tr:hover {
        background-color: #f2f9ff;
      }

      @media (max-width: 768px) {
        table,
        thead,
        tbody,
        th,
        td,
        tr {
          display: block;
        }

        thead {
          display: none;
        }

        tr {
          margin-bottom: 20px;
          background: #fff;
          border-radius: 8px;
          padding: 10px;
        }

        td {
          text-align: left;
          padding-left: 50%;
          position: relative;
          border: none;
          border-bottom: 1px solid #eee;
        }

        td::before {
          content: attr(data-label);
          position: absolute;
          left: 15px;
          top: 50%;
          transform: translateY(-50%);
          font-weight: bold;
        }
      }
    </style>
  </head>
  <body>
    <div class="container-box">
      <h2>🖥️ All Registered Users</h2>

      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Username</th>
            <th>Phone</th>
            <th>Date of Birth</th>
          </tr>
        </thead>
        <tbody>
          {% for user in users %}
          <tr>
            <td data-label="ID">{{ loop.index }}</td>
            <td data-label="Username">{{ user[1] }}</td>
            <td data-label="Phone">{{ user[2] }}</td>
            <td data-label="Date of Birth">{{ user[3] }}</td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </body>
</html>
