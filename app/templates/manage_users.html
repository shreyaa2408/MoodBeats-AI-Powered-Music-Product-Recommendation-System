<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Manage Users - MoodBeats</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        background-color: #eafaff;
        margin: 0;
        padding: 40px;
      }

      .container {
        max-width: 1000px;
        margin: auto;
        background: white;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 8px 18px rgba(0, 0, 0, 0.1);
      }

      h2 {
        color: #0077b6;
        text-align: center;
        margin-bottom: 25px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        border: 1px solid #ccc;
      }

      th,
      td {
        padding: 14px 16px;
        border: 1px solid #ccc; /* Vertical + Horizontal lines */
        text-align: center;
      }

      th {
        background-color: #0099cc;
        color: white;
        font-weight: 600;
      }

      tr:hover {
        background-color: #f1f9ff;
      }

      .delete-btn {
        background-color: #ff4d4d;
        color: white;
        padding: 6px 12px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
        transition: background-color 0.2s ease;
      }

      .delete-btn:hover {
        background-color: #cc0000;
      }

      @media (max-width: 768px) {
        table,
        thead,
        tbody,
        th,
        td,
        tr {
          display: block;
        }

        thead tr {
          display: none;
        }

        td {
          position: relative;
          padding-left: 50%;
          text-align: left;
          border: 1px solid #ccc;
        }

        td::before {
          content: attr(data-label);
          position: absolute;
          left: 15px;
          font-weight: bold;
          color: #333;
        }

        .delete-btn {
          width: 100%;
          margin-top: 8px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>👥 Manage Users</h2>

      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Username</th>
            <th>Phone</th>
            <th>Date of Birth</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody>
          {% for user in users %}
          <tr>
            <td data-label="ID">{{ loop.index }}</td>

            <td data-label="Username">{{ user[1] }}</td>
            <td data-label="Phone">{{ user[2] }}</td>
            <td data-label="Date of Birth">{{ user[3] }}</td>
            <td data-label="Action">
              <form
                method="POST"
                action="{{ url_for('main.delete_user', user_id=user[0]) }}"
                onsubmit="return confirm('Are you sure you want to delete this user?');"
              >
                <button type="submit" class="delete-btn">
                  <i class="fas fa-trash"></i> Delete
                </button>
              </form>
            </td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </body>
</html>
