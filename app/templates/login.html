<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Login - MoodBeats</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background: linear-gradient(to right, #e0f7fa, #ffffff);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: "Segoe UI", sans-serif;
      }
      .card {
        width: 350px;
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
      }
      .form-control {
        border-radius: 10px;
      }
      h4 {
        color: #007bff;
        font-weight: bold;
        margin-bottom: 20px;
      }
      .btn {
        border-radius: 10px;
      }

      .flash-message {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 1050;
        background-color: rgba(0, 0, 0, 0.85);
        color: #fff;
        padding: 12px 24px;
        border-radius: 8px;
        font-size: 1rem;
        text-align: center;
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        animation: fadeInOut 3s ease forwards;
      }

      @keyframes fadeInOut {
        0% {
          opacity: 0;
          bottom: 0;
        }
        10%,
        90% {
          opacity: 1;
          bottom: 30px;
        }
        100% {
          opacity: 0;
          bottom: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="card text-center">
      <h4>Login to MoodBeats</h4>
      <form action="/login" method="POST">
        <input
          type="text"
          name="username"
          class="form-control mb-3"
          placeholder="Username"
          required
        />
        <input
          type="password"
          name="password"
          class="form-control mb-3"
          placeholder="Password"
          required
        />
        <button type="submit" class="btn btn-primary w-100">Login</button>
      </form>
      <div class="mt-3">
        <a href="/">Back to Home</a>
      </div>
    </div>
    {% with messages = get_flashed_messages() %} {% if messages %}
    <div class="flash-message">
      {% for message in messages %} {{ message }} {% endfor %}
    </div>
    {% endif %} {% endwith %}
  </body>
</html>
